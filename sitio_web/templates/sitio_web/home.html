<html>

<head>

  <title>Inicio</title>

</head>

{% extends "sitio_web/base.html" %}

<body>

  

    {% load static %}

    
    {% load crispy_forms_tags %}
    {% block content %}

    
    <div class="container" style="margin: auto; text-align: center;">
         
      <form action="" method="post">
        {% csrf_token %}
        <label style="color: white; text-align: center;margin-top: 50px;"> Ingresa el nombre del producto</label>
        <br>
        <h5 style="color: white; text-align: center;margin-top: 15px;">
        Trata de ser lo más específico posible para una mejor búsqueda!</h5>

        <div style="width: 75%; margin: auto;">
          {{form|crispy}}
         
          <button type="submit" class="btn btn-success" style="text-align: center; margin-top: 5px;">Ingresar</button>
      </form>

    </div>

    {% endblock %}

</body>
